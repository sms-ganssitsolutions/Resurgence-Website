name = "resurgence-website"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Enable workers.dev route (for testing)
workers_dev = true
preview_urls = true

# R2 Bucket binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "resurgence-logos"

# Environment variables
[vars]
ALLOWED_ORIGINS = "https://resurgence-dx.biz,http://localhost:3000,http://127.0.0.1:5500"
MAX_FILE_SIZE_MB = "5"

# Optional: Add a secret later for extra protection
# wrangler secret put UPLOAD_SECRET
