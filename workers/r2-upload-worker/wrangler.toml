name = "resurgence-r2-upload"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# R2 Bucket binding
# IMPORTANT: Create your R2 bucket first in the Cloudflare dashboard
# Then run: wrangler r2 bucket create resurgence-logos
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "resurgence-logos"

# Environment variables (optional but recommended)
[vars]
ALLOWED_ORIGINS = "https://resurgence-dx.biz,http://localhost:3000,http://127.0.0.1:5500"
MAX_FILE_SIZE_MB = "5"

# For production, lock this down further
# You can also add a secret for simple auth if needed later
# wrangler secret put UPLOAD_SECRET
